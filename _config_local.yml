# Site settings
course_code: ELL8299/COL8383
course_name: "Trustworthy Large Language Models"
course_description: "Large Language Models (LLMs) are rapidly becoming the foundation of modern AI systems, powering applications ranging from conversational assistants and code generation to scientific discovery and autonomous agents. While recent advances have dramatically improved their capabilities, deploying these models responsibly requires addressing fundamental challenges related to privacy, security, robustness, fairness, reliability, and interpretability. This advanced course provides a comprehensive introduction to the principles, techniques, and emerging research behind trustworthy and responsible LLMs. Beginning with the foundations of transformer-based language models, instruction tuning, alignment, and decoding strategies, students will develop the background necessary to understand how modern LLMs are trained and deployed.<br/><br/>This course then explores the key challenges that arise in real-world LLM systems, including privacy leakage, adversarial attacks, jailbreaking, hallucinations, uncertainty estimation, algorithmic bias, watermarking, and mechanistic interpretability. Alongside state-of-the-art defense mechanisms such as differential privacy, robust training, retrieval-augmented generation, verification, calibration, and machine unlearning, students will examine recent research papers, benchmarks, and practical techniques for building trustworthy AI systems. By the end of the course, students will have a deep understanding of both the capabilities and limitations of contemporary language models, equipping them to critically evaluate, design, and develop the next generation of reliable, secure, and accountable AI systems.<br/><br/>Students should have a background in Machine Learning and be proficient in Python programming. At least some basic knowledge of Deep Learning and NLP is preferred. Through assignments and a course project, students will acquire the skills necessary to design, implement, and understand LLMs using the PyTorch framework."
course_semester: "Semester I, 2026-27"

